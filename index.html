function calcVal(d){const sec=SECTORS.find(s=>s.id===d.sector);if(!sec||!d.ebitda)return null;let m=sec.baseMultiple;m+=RECURRING.indexOf(d.recurring)*0.3;m+=(GROWTH.indexOf(d.growth)-1)*0.2;const margin=d.revenue>0?(d.ebitda/d.revenue)*100:0;if(margin>30)m+=sec.marginBonus;else if(margin>20)m+=sec.marginBonus*0.5;m-=(3-OWNER_DEP.indexOf(d.ownerDep))*0.3;m+=YEARS.indexOf(d.years)*0.1;m=Math.max(1.5,Math.min(12,m));const c=d.ebitda*m;return{multiple:m,low:c*0.82,central:c,high:c*1.18,margin,sector:sec.label};}

function NDAModal({listing,onClose}){
  const[form,setForm]=useState({name:"",email:"",company:"",phone:"",purpose:"Potential acquisition",agreed:false});
  const[signed,setSigned]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const ok=form.name&&form.email&&form.company&&form.agreed;
  if(signed)return(
    <div style={{position:"relative",background:"#fff",borderRadius:12,padding:24,maxWidth:480,width:"100%",maxHeight:"85vh",overflow:"auto"}}>

        <div style={{background:"#f9fafb",borderRadius:8,padding:12,textAlign:"left",marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:"#111",marginBottom:6}}>What happens next</div>
          {[{n:"1",t:"IM delivered",d:"Confidential document with full financials, operations overview, and growth thesis"},{n:"2",t:"Q&A session",d:"Schedule a call with B8N to discuss the opportunity and ask questions"},{n:"3",t:"Indicative offer",d:"If interested, submit a non-binding indicative offer (NBIO) for B8N to present to the seller"}].map(s=>(
            <div key={s.n} style={{display:"flex",gap:8,marginBottom:6}}>
              <div style={{width:18,height:18,borderRadius:9,background:P,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{s.n}</div>
              <div><div style={{fontSize:11,fontWeight:600,color:"#111"}}>{s.t}</div><div style={{fontSize:10,color:"#6b7280"}}>{s.d}</div></div>
            </div>))}
        </div>
        <div onClick={onClose} style={{padding:"9px 20px",borderRadius:8,background:P,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",display:"inline-block"}}>Done</div>
      </div>
    </div>);

    <div style={{position:"relative",background:"#fff",borderRadius:12,padding:24,maxWidth:520,width:"100%",maxHeight:"85vh",overflow:"auto"}}>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>

        <span style={{fontSize:14,fontWeight:600,color:"#111"}}>Request Information Memorandum</span>

      <div style={{background:"#fef3c7",borderRadius:8,padding:12,marginBottom:16,border:"1px solid #fde68a"}}>
        <div style={{fontSize:12,fontWeight:600,color:"#92400e",marginBottom:2}}>Non-Disclosure Agreement required</div>
        <div style={{fontSize:11,color:"#a16207",lineHeight:1.5}}>This listing contains confidential information. You must agree to B8N's NDA terms before receiving the Information Memorandum.</div>
      </div>
      {[{k:"name",l:"Full legal name",p:"As it will appear on the NDA"},{k:"email",l:"Email address",p:"you@company.com"},{k:"company",l:"Company / entity name",p:"Acquiring entity or personal name"},{k:"phone",l:"Phone",p:"+61..."}].map(f=>(
        <div key={f.k} style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>{f.l}</div>

      ))}

        <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Purpose of inquiry</div>
        <select value={form.purpose} onChange={e=>set("purpose",e.target.value)} style={sel}>
          <option>Potential acquisition</option><option>Strategic partnership</option><option>Investment opportunity</option><option>Market research (advisory)</option>
        </select>

      <div style={{background:"#f9fafb",borderRadius:8,padding:12,marginBottom:12,maxHeight:160,overflow:"auto",fontSize:10,color:"#6b7280",lineHeight:1.6}}>
        <div style={{fontWeight:600,color:"#111",marginBottom:4,fontSize:11}}>Non-Disclosure Agreement — Key Terms</div>
        <p style={{margin:"0 0 6px"}}>By signing below, you ("Recipient") agree to the following terms with B8N Pty Ltd ("Discloser") regarding confidential information related to listing {listing.blind}:</p>
        <p style={{margin:"0 0 6px"}}><strong>1. Confidential Information.</strong> All information provided in the Information Memorandum, financial data, business plans, customer lists, trade secrets, and any other proprietary information disclosed by B8N or the business owner.</p>
        <p style={{margin:"0 0 6px"}}><strong>2. Obligations.</strong> Recipient shall: (a) maintain strict confidentiality; (b) not disclose to any third party without prior written consent; (c) use information solely for evaluating the potential transaction; (d) not contact the business, its employees, customers, or suppliers directly.</p>
        <p style={{margin:"0 0 6px"}}><strong>3. Term.</strong> Obligations survive for 2 years from the date of execution, regardless of whether a transaction proceeds.</p>
        <p style={{margin:"0 0 6px"}}><strong>4. Return of materials.</strong> Upon request or if the Recipient decides not to proceed, all confidential materials must be returned or destroyed.</p>
        <p style={{margin:"0 0 6px"}}><strong>5. Remedies.</strong> Recipient acknowledges that breach may cause irreparable harm and that Discloser is entitled to seek injunctive relief in addition to other remedies.</p>
        <p style={{margin:0}}><strong>6. Governing law.</strong> This agreement is governed by the laws of New South Wales, Australia.</p>
      </div>
      <label style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:16,cursor:"pointer"}}>
        <input type="checkbox" checked={form.agreed} onChange={e=>set("agreed",e.target.checked)} style={{...chk,marginTop:2}}/>
        <span style={{fontSize:11,color:"#111",lineHeight:1.5}}>I have read and agree to the Non-Disclosure Agreement. I understand that all information received is strictly confidential and may only be used for the purpose stated above. This constitutes my electronic signature.</span>
      </label>
      <div onClick={ok?()=>setSigned(true):undefined} style={{...btnP,opacity:ok?1:0.4,cursor:ok?"pointer":"default"}}>Sign NDA & request IM</div>
      <div style={{textAlign:"center",marginTop:8,fontSize:10,color:"#9ca3af"}}>Your details are securely stored. NDA is legally binding upon submission.</div>
    </div>);
}

function ListingDetail({listing,onBack}){

  return(<div>
    {showNDA&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setShowNDA(false)}}>
      <NDAModal listing={listing} onClose={()=>setShowNDA(false)}/>
    </div>}
    <div style={{background:"#0f0a2e",padding:"20px 20px 24px"}}>
      <div style={{maxWidth:720,margin:"0 auto"}}>
        <div onClick={onBack} style={{fontSize:11,color:"#9e99c2",cursor:"pointer",marginBottom:10}}>← Back to listings</div>

function ValuationPage({go}){
  const[step,setStep]=useState(0);
  const[d,setD]=useState({sector:"",revenue:"",ebitda:"",recurring:RECURRING[0],growth:GROWTH[1],ownerDep:OWNER_DEP[1],years:YEARS[2],state:"NSW",city:"",name:"",email:"",phone:"",biz:"",reason:REASONS[0]});
  const[result,setResult]=useState(null);
  const[done,setDone]=useState(false);
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const rev=parseFloat(d.revenue)||0;
  const ebitda=parseFloat(d.ebitda)||0;
  const ok=()=>{if(step===0)return d.sector&&rev>0&&ebitda>0;if(step===1)return true;if(step===2)return d.name&&d.email&&d.biz;return true;};
  const doCalc=()=>{setResult(calcVal({...d,revenue:rev,ebitda}));setStep(3);};
  const comm=result?commRate(result.central):null;

  return(<div>
    <div style={{background:"#0f0a2e",padding:"20px 20px 16px"}}><div style={{maxWidth:480,margin:"0 auto"}}><div onClick={()=>go("home")} style={{fontSize:11,color:"#9e99c2",cursor:"pointer",marginBottom:8}}>← B8N</div><h1 style={{color:"#fff",fontSize:20,fontWeight:600,margin:"0 0 4px"}}>Free business valuation</h1><p style={{color:"#9e99c2",fontSize:12,margin:0}}>Powered by B8N market data · 500+ transactions</p></div></div>
    <div style={{maxWidth:480,margin:"0 auto",padding:20}}>
      <div style={{display:"flex",gap:4,marginBottom:20}}>{[0,1,2,3].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?P:"#e5e7eb"}}/>)}</div>
      {step===0&&<div>
        <div style={{fontSize:14,fontWeight:600,color:"#111",marginBottom:14}}>Tell us about your business</div>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Industry sector</div><select value={d.sector} onChange={e=>set("sector",e.target.value)} style={sel}><option value="">Select...</option>{SECTORS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Annual revenue (AUD, '000s)</div><input type="number" value={d.revenue} onChange={e=>set("revenue",e.target.value)} placeholder="e.g. 5000" style={inp}/>{rev>0&&<div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>= {fK(rev)}</div>}</div>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Annual EBITDA (AUD, '000s)</div><input type="number" value={d.ebitda} onChange={e=>set("ebitda",e.target.value)} placeholder="e.g. 1200" style={inp}/>{ebitda>0&&rev>0&&<div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>= {fK(ebitda)} · {((ebitda/rev)*100).toFixed(0)}% margin</div>}</div>
        <div style={{marginBottom:14}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>Location</div><div style={{display:"flex",gap:8}}><select value={d.state} onChange={e=>set("state",e.target.value)} style={{...sel,width:90}}>{["NSW","VIC","QLD","SA","WA","TAS","NT","ACT"].map(s=><option key={s}>{s}</option>)}</select><input value={d.city} onChange={e=>set("city",e.target.value)} placeholder="City" style={inp}/></div></div>
        <div onClick={ok()?()=>setStep(1):undefined} style={{...btnP,opacity:ok()?1:0.4}}>Next: business profile</div>
      </div>}
      {step===1&&<div>
        <div style={{fontSize:14,fontWeight:600,color:"#111",marginBottom:14}}>Business profile</div>
        {[{k:"recurring",l:"Recurring / contracted revenue %",o:RECURRING},{k:"growth",l:"Revenue growth (YoY)",o:GROWTH},{k:"ownerDep",l:"Owner dependency",o:OWNER_DEP},{k:"years",l:"Years in operation",o:YEARS}].map(f=>(<div key={f.k} style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>{f.l}</div><select value={d[f.k]} onChange={e=>set(f.k,e.target.value)} style={sel}>{f.o.map(o=><option key={o}>{o}</option>)}</select></div>))}
        <div style={{display:"flex",gap:8}}><div onClick={()=>setStep(0)} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #e5e7eb",fontSize:13,cursor:"pointer",color:"#6b7280"}}>Back</div><div onClick={doCalc} style={{...btnP,flex:1}}>Calculate valuation</div></div>
      </div>}
      {step===3&&!done&&result&&<div>
        <div style={{textAlign:"center",marginBottom:6}}><div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Indicative valuation</div><div style={{fontSize:34,fontWeight:800,color:P}}>{fK(result.central)}</div></div>
        <div style={{position:"relative",height:32,background:"#f3f4f6",borderRadius:16,overflow:"hidden",margin:"12px 0 8px"}}><div style={{position:"absolute",left:(result.low/result.high/1.3)*100*0.9+"%",width:(result.high-result.low)/result.high/1.3*100*0.9+"%",height:"100%",background:"linear-gradient(90deg,#c4b5fd,#7c3aed,#c4b5fd)",borderRadius:16,opacity:0.3}}/><div style={{position:"absolute",left:(result.central/result.high/1.3)*100*0.9+"%",top:3,width:3,height:26,background:P,borderRadius:2}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#9ca3af",marginBottom:14}}><span>Low: {fK(result.low)}</span><span style={{fontWeight:700,color:P}}>Mid: {fK(result.central)}</span><span>High: {fK(result.high)}</span></div>
        <div style={{background:"#f9fafb",borderRadius:8,padding:12,marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:"#111",marginBottom:8}}>Breakdown</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{[{l:"Revenue",v:fK(rev)},{l:"EBITDA",v:fK(ebitda)},{l:"Margin",v:result.margin.toFixed(0)+"%"},{l:"Multiple",v:result.multiple.toFixed(1)+"x"},{l:"Sector",v:result.sector},{l:"Recurring",v:d.recurring}].map(x=>(<div key={x.l} style={{fontSize:11}}><span style={{color:"#9ca3af"}}>{x.l}: </span><span style={{color:"#111",fontWeight:500}}>{x.v}</span></div>))}</div></div>
        <div style={{background:"#f9fafb",borderRadius:8,padding:12,marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:"#111",marginBottom:4}}>B8N brokerage fee</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:18,fontWeight:700,color:"#0891b2"}}>{comm.r}</span><span style={{fontSize:11,color:"#9ca3af",marginLeft:4}}>success fee</span></div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:600}}>{fK(Math.max(comm.f,50))}</div><div style={{fontSize:9,color:"#9ca3af"}}>no upfront cost</div></div></div></div>
        <div style={{background:"#f3f0ff",borderRadius:10,padding:14,border:"1px solid #e9e0ff",textAlign:"center",marginBottom:12}}><div style={{fontSize:13,fontWeight:600,color:"#5b21b6",marginBottom:3}}>Get the full report</div><div style={{fontSize:11,color:"#6d28d9",marginBottom:10}}>Sector benchmarks, comparables, and a confidential discussion.</div><div onClick={()=>setStep(2)} style={{display:"inline-block",padding:"9px 20px",borderRadius:8,background:"#5b21b6",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Unlock report — free</div></div>
        <div style={{textAlign:"center"}}><span onClick={()=>{setStep(0);setResult(null)}} style={{fontSize:12,color:"#9ca3af",cursor:"pointer"}}>Start over</span></div>
      </div>}
      {step===2&&<div>
        <div style={{fontSize:14,fontWeight:600,color:"#111",marginBottom:14}}>Unlock your full report</div>
        {[{k:"name",l:"Your name",p:"Full name"},{k:"email",l:"Email",p:"you@company.com"},{k:"phone",l:"Phone (optional)",p:"+61..."},{k:"biz",l:"Business name",p:"Your company"}].map(f=>(<div key={f.k} style={{marginBottom:10}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>{f.l}</div><input value={d[f.k]} onChange={e=>set(f.k,e.target.value)} placeholder={f.p} style={inp}/></div>))}
        <div style={{marginBottom:14}}><div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>What brings you here?</div><select value={d.reason} onChange={e=>set("reason",e.target.value)} style={sel}>{REASONS.map(r=><option key={r}>{r}</option>)}</select></div>
        <div style={{display:"flex",gap:8}}><div onClick={()=>setStep(3)} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #e5e7eb",fontSize:13,cursor:"pointer",color:"#6b7280"}}>Back</div><div onClick={ok()?()=>setDone(true):undefined} style={{...btnP,flex:1,opacity:ok()?1:0.4}}>Get full report</div></div>
      </div>}
      {done&&<div style={{textAlign:"center",padding:"20px 0"}}><div style={{width:48,height:48,borderRadius:24,background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:22,color:"#059669"}}>✓</div><h2 style={{margin:"0 0 6px",fontSize:18,fontWeight:600}}>Thank you, {d.name.split(" ")[0]}!</h2><p style={{fontSize:12,color:"#6b7280",margin:"0 0 16px"}}>Report for <strong>{d.biz}</strong> sent to <strong>{d.email}</strong> within 24h.</p>
        <div style={{background:"#f3f0ff",borderRadius:8,padding:10,border:"1px solid #e9e0ff"}}><div style={{fontSize:11,fontWeight:600,color:"#5b21b6"}}>CRM entry created</div><div style={{fontSize:10,color:"#6d28d9"}}>Brokerage track, Stage 0 (Sourced)</div></div></div>}
    </div>
  </div>);}

function Footer(){return(<div style={{background:"#0f0a2e",padding:20,marginTop:4}}><div style={{maxWidth:720,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:20,height:20,borderRadius:5,background:P,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:10,fontWeight:700}}>B</span></div><span style={{color:"#a5a0c8",fontSize:11}}>B8N Pty Ltd</span></div><div style={{display:"flex",gap:16,fontSize:10,color:"#7c6db5"}}><span>Level 4, 233 Castlereagh St, Sydney</span><span>+61 410 964 458</span></div></div></div>);}

function App(){
  const[page,setPage]=useState("home");
  const topRef=useRef(null);
  const go=p=>{setPage(p);setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);};
  const sectorFromPage=useMemo(()=>{if(page.startsWith("sector_")){return SECTORS.find(s=>s.id===page.replace("sector_",""))||null;}return null;},[page]);
  const active=sectorFromPage?"sector_detail":page;

  return(<div ref={topRef} style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#fff",minHeight:"100vh"}}>
    <Nav page={sectorFromPage?"research":(page.startsWith("sector_")?"research":page)} go={go}/>
    {active==="home"&&<HomePage go={go}/>}
    {active==="sell"&&<SellPage go={go}/>}
    {active==="raise"&&<RaisePage go={go}/>}
    {active==="buy"&&<BuyPage go={go}/>}
    {active==="research"&&<ResearchPage go={go}/>}
    {active==="sector_detail"&&sectorFromPage&&<SectorDetail sector={sectorFromPage} go={go}/>}
    {active==="about"&&<AboutPage/>}
    {active==="valuation"&&<ValuationPage go={go}/>}
    <Footer/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
