<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

function usePageMeta(page) {
  useEffect(() => {
    const m = META[page] || META.home;
    document.title = m.t;
    document.querySelector('meta[name="description"]').content = m.d;
  }, [page]);
}

/* ============================================================
   HUBSPOT
   ============================================================ */
function getUtm() {
  try { const p = new URLSearchParams(location.search); return {s:p.get("utm_source")||"",m:p.get("utm_medium")||"",c:p.get("utm_campaign")||""}; } catch { return {s:"",m:"",c:""}; }
}

async function hsSubmit(guid, fields, src) {
  const u = getUtm();
  try {
    await fetch(`https://api.hsforms.com/submissions/v3/integration/submit/${C.hsPortal}/${guid}`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ portalId:C.hsPortal, formGuid:guid, fields:[...fields,{name:"hs_lead_source",value:src},{name:"utm_source",value:u.s},{name:"utm_medium",value:u.m},{name:"utm_campaign",value:u.c}], context:{pageUri:location.href,pageName:document.title} })
    }); return true;
  } catch(e) { console.error("HS error:",e); return false; }
}

/* ============================================================
   ANIMATION
   ============================================================ */
function useAnim(cfg={}) {
  const ref=useRef(null),ran=useRef(false);
  const {type="fade-up",delay=0,dur=620,stagger=0,kids=false}=cfg;
  useEffect(()=>{
    const el=ref.current;if(!el||ran.current)return;
    const K={"fade-up":[{opacity:0,transform:"translateY(26px)"},{opacity:1,transform:"translateY(0)"}],"slide-l":[{opacity:0,transform:"translateX(-36px)"},{opacity:1,transform:"translateX(0)"}],"slide-r":[{opacity:0,transform:"translateX(36px)"},{opacity:1,transform:"translateX(0)"}],"scale":[{opacity:0,transform:"scale(0.92)"},{opacity:1,transform:"scale(1)"}],"blur":[{opacity:0,filter:"blur(6px)"},{opacity:1,filter:"blur(0)"}]};
    el.style.opacity="0";const E="cubic-bezier(0.16,1,0.3,1)";
    const obs=new IntersectionObserver(([e])=>{if(!e.isIntersecting||ran.current)return;ran.current=true;obs.disconnect();if(kids&&stagger){Array.from(el.children).forEach((c,i)=>{c.style.opacity="0";c.animate(K[type],{duration:dur,delay:delay+i*stagger,easing:E,fill:"forwards"})});el.style.opacity="1";}else{el.animate(K[type],{duration:dur,delay,easing:E,fill:"forwards"});}},{threshold:0.08});
    obs.observe(el);return()=>obs.disconnect();
  },[type,delay,dur,stagger,kids]);
  return ref;
}

function FadeUp(p){const r=useAnim({type:"fade-up",delay:p.delay||0});return React.createElement("div",{ref:r,className:p.className||""},p.children);}
function SlideL(p){const r=useAnim({type:"slide-l",delay:p.delay||0});return React.createElement("div",{ref:r,className:p.className||""},p.children);}
function SlideR(p){const r=useAnim({type:"slide-r",delay:p.delay||0});return React.createElement("div",{ref:r,className:p.className||""},p.children);}
function ScaleUp(p){const r=useAnim({type:"scale",delay:p.delay||0});return React.createElement("div",{ref:r,className:p.className||""},p.children);}
function BlurIn(p){const r=useAnim({type:"blur",delay:p.delay||0});return React.createElement("div",{ref:r,className:p.className||""},p.children);}
function Stagger(p){const r=useAnim({type:p.type||"fade-up",stagger:p.stagger||80,kids:true});return React.createElement("div",{ref:r,className:p.className||""},p.children);}

/* ============================================================

const BUY_BOX=[["EBITDA","A$1M – $10M"],["Revenue","A$5M – $50M+"],["Enterprise Value","A$5M – $60M"],["Equity Cheque","A$3M – $20M"],["Ownership","Majority or significant minority"],["Geography","Australia (+ DACH cross-border)"],["Sectors We Like","Tech-enabled services, SaaS, business services, healthcare, industrial, consumer"],["Sectors We Avoid","Mining/resources, property dev, pre-revenue, retail food, agriculture"],["Situations","Growth capital, succession, MBO, partial exit, buy & build"]];

    {qs===6&&qr&&<div className="fm-step-enter text-center">{qr.fit?<><div className="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 text-xl flex items-center justify-center mx-auto mb-4">✓</div><h4 className="text-base font-bold text-slate-900 mb-2">Looks like a fit.</h4><p className="text-sm text-slate-500 mb-4">Send teaser to <span className="font-semibold text-sky-800">deals@b8n.com</span></p></>:<><div className="w-12 h-12 rounded-full bg-amber-50 text-amber-600 text-xl flex items-center justify-center mx-auto mb-4">!</div><h4 className="text-base font-bold text-slate-900 mb-2">May be outside criteria.</h4><div className="space-y-1 mb-4">{qr.r.map(r=><p key={r} className="text-sm text-slate-500">{r}</p>)}</div></>}<Btn variant="outline" size="sm" className="fm-btn-lift mt-2" onClick={reset}>Start over</Btn></div>}
  </CrdC></Crd></ScaleUp></Cx></section>

  <section className="py-16 bg-slate-50"><Cx><div className="grid md:grid-cols-2 gap-8"><FadeUp><h3 className="text-lg font-bold text-slate-900 mb-4">Deal contact</h3><Crd className="fm-card-lift transition-all duration-300"><CrdC className="py-6"><div className="flex items-center gap-4 mb-4"><div className="w-14 h-14 rounded-full bg-slate-900 text-white text-base font-bold flex items-center justify-center shrink-0">MB</div><div><div className="flex items-center gap-2"><h4 className="text-base font-bold text-slate-900">Markus Binder</h4><a href={C.li.mb} target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-sky-700 transition-colors"><LiIco/></a></div><p className="text-sm text-sky-800 font-semibold">Co-founder & MD</p></div></div><Sep className="my-4"/><div className="space-y-2 text-sm"><div className="flex justify-between"><span className="text-slate-500">Deals</span><span className="font-medium text-slate-900">deals@b8n.com</span></div><div className="flex justify-between"><span className="text-slate-500">Direct</span><span className="font-medium text-slate-900">markus@b8n.com</span></div><div className="flex justify-between"><span className="text-slate-500">Mobile</span><span className="font-medium text-slate-900">+61 410 964 458</span></div></div><Sep className="my-4"/><p className="text-xs text-slate-400 italic">48 hours. A fast no is better than a slow no.</p></CrdC></Crd></FadeUp><FadeUp delay={150}><h3 className="text-lg font-bold text-slate-900 mb-4">One-page overview</h3><Crd className="fm-card-lift transition-all duration-300"><CrdC className="py-6"><p className="text-sm text-slate-600 leading-relaxed mb-4">Criteria, process, contact. One page. Forward to clients.</p><Btn className="w-full fm-btn-lift">Download PDF</Btn><p className="text-xs text-slate-400 text-center mt-3">No email. No signup.</p></CrdC></Crd></FadeUp></div></Cx></section></>;
}

/* ============================================================
   CONTACT — HubSpot-ready
   ============================================================ */
function ContactPage({go}){

  const fd=useRef({});

  const set=(k,v)=>{fd.current[k]=v};
  const send=async()=>{setSub(true);const f=fd.current;await hsSubmit(C.hsFormContact,[{name:"firstname",value:f.firstname||""},{name:"company",value:f.company||""},{name:"email",value:f.email||""},{name:"phone",value:f.phone||""},{name:"annual_ebitda",value:f.annual_ebitda||""},{name:"message",value:f.message||""}],"contact_page");setSub(false);setSent(true);};

  return <><PH tag="Contact" title="Start a confidential conversation." sub="Whether you're selling, exploring, or referring a client."/><section className="py-16"><Cx><div className="grid md:grid-cols-5 gap-12"><div className="md:col-span-3"><ScaleUp><Crd><CrdC className="p-8">{sent?<div className="text-center py-10 fm-step-enter"><div className="w-14 h-14 rounded-full bg-emerald-50 text-emerald-600 text-2xl flex items-center justify-center mx-auto mb-4">✓</div><h3 className="text-lg font-bold text-slate-900 mb-2">Message received.</h3><p className="text-sm text-slate-500 mb-4">We respond within 24 hours.</p><Btn variant="outline" size="sm" className="fm-btn-lift" onClick={()=>{setSent(false);fd.current={}}}>Send another</Btn></div>:<div className="space-y-4 fm-step-enter"><div className="grid grid-cols-2 gap-3"><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Name</span><input className={ic} name="firstname" onChange={e=>set("firstname",e.target.value)}/></label><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Business</span><input className={ic} name="company" onChange={e=>set("company",e.target.value)}/></label></div><div className="grid grid-cols-2 gap-3"><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Email</span><input className={ic} name="email" type="email" onChange={e=>set("email",e.target.value)}/></label><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Phone</span><input className={ic} name="phone" onChange={e=>set("phone",e.target.value)}/></label></div><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Annual EBITDA</span><select className={ic} name="annual_ebitda" onChange={e=>set("annual_ebitda",e.target.value)}><option value="">Select...</option><option>&lt;$1M</option><option>$1–3M</option><option>$3–5M</option><option>$5–10M</option><option>$10M+</option></select></label><label className="block"><span className="block text-xs font-semibold text-slate-600 mb-1.5">Message</span><textarea className={`${ic} h-28 resize-none`} name="message" onChange={e=>set("message",e.target.value)}/></label><Btn className="w-full fm-btn-lift" onClick={send} disabled={sub}>{sub?"Sending...":"Send Message"}</Btn><p className="text-xs text-slate-400 text-center">24-hour response. Fully confidential.</p></div>}</CrdC></Crd></ScaleUp></div><div className="md:col-span-2"><FadeUp delay={200}><div className="space-y-6"><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2">Business owners</h4><p className="text-sm text-slate-700 font-medium">founders@b8n.com</p></div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2">Deals & brokers</h4><p className="text-sm text-slate-700 font-medium">deals@b8n.com</p></div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2">Phone</h4><p className="text-sm text-slate-700">+61 410 964 458</p></div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2">Office</h4><p className="text-sm text-slate-600">Level 4, 233 Castlereagh St<br/>Sydney NSW 2000</p></div><Sep/><div className="flex items-center gap-3"><a href={C.li.co} target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-sky-700 transition-colors"><LiIco/></a><span className="text-sm text-slate-500">Follow B8N on LinkedIn</span></div><Btn variant="outline" size="sm" className="fm-btn-lift w-full" onClick={()=>go("advisers")}>For Advisers page</Btn></div></FadeUp></div></div></Cx></section></>;
}

function Footer({go}){return <footer className="bg-slate-900 pt-14 pb-8"><Cx><div className="grid grid-cols-2 md:grid-cols-4 gap-8 mb-10"><div className="col-span-2 md:col-span-1"><span className="block text-2xl font-extrabold text-white tracking-tight mb-2">B8N</span><p className="text-sm text-slate-400 mb-3">We build companies.<br/>Not just portfolios.</p><a href={C.li.co} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm"><LiIco/><span>LinkedIn</span></a></div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-4">Navigate</h4>{[["home","Home"],["why","Why B8N"],["build","How We Build"],["thinking","Our Thinking"]].map(([k,l])=><button key={k} onClick={()=>go(k)} className="block text-sm text-slate-400 hover:text-white transition-colors py-1">{l}</button>)}</div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-4">For You</h4>{[["team","The Team"],["founders","Sell Your Business"],["advisers","For Advisers"],["contact","Contact"]].map(([k,l])=><button key={k} onClick={()=>go(k)} className="block text-sm text-slate-400 hover:text-white transition-colors py-1">{l}</button>)}</div><div><h4 className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-4">Deals</h4><p className="text-sm text-slate-400 mb-1">deals@b8n.com</p><p className="text-sm text-slate-400 mb-1">founders@b8n.com</p><p className="text-sm text-slate-400 mb-3">+61 410 964 458</p><p className="text-xs text-slate-500">Level 4, 233 Castlereagh St, Sydney</p></div></div><Sep className="bg-white/10 mb-5" style={{background:"rgba(255,255,255,.08)"}}/><div className="flex flex-wrap justify-between items-center gap-4"><p className="text-xs text-slate-500">© 2026 B8N Pty Ltd</p><div className="flex gap-4 text-xs text-slate-500"><span className="hover:text-white transition-colors cursor-pointer">Privacy</span><a href={C.li.co} target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">LinkedIn</a></div></div></Cx></footer>;}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const[page,setPage]=useState("home");
  const[tr,sTr]=useState(false);

  usePageMeta(page);

  // HubSpot tracking script
  useEffect(()=>{
    if(C.hsPortal==="YOUR_PORTAL_ID")return;
    if(document.getElementById("hs-script"))return;
    const s=document.createElement("script");s.id="hs-script";s.src=`//js.hs-scripts.com/${C.hsPortal}.js`;s.async=true;s.defer=true;document.body.appendChild(s);
  },[]);

  const go=useCallback(p=>{
    if(p===page)return;
    sTr(true);
    setTimeout(()=>{setPage(p);window.scrollTo({top:0});requestAnimationFrame(()=>sTr(false));},180);
  },[page]);

  const pages={home:HomePage,why:WhyPage,build:BuildPage,thinking:ThinkingPage,team:TeamPage,founders:FoundersPage,advisers:AdvisersPage,contact:ContactPage};
  const Page=pages[page]||HomePage;

  return <div className="min-h-screen bg-white text-slate-900"><Nav page={page} go={go}/><main className={`page-tr ${tr?"page-tr--out":"page-tr--in"}`}><Page go={go}/></main><Footer go={go}/></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
